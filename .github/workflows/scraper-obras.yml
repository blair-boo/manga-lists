name: Scraper - Obras

# Sem agendamento de propósito: essa varredura é disparada manualmente pelo botão
# "Update works" na aba Atualizações do app (via Supabase Edge Function).
on:
  workflow_dispatch: {}

concurrency:
  group: scraper-obras
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Instalar dependências
        run: pip install -r scraper/requirements.txt

      - name: Casar catálogo dos sites com obras cadastradas
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python update_obras.py
