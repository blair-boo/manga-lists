name: Scraper - Fontes

# Sem agendamento de propósito: essa busca é disparada manualmente pelo botão
# "Iniciar busca" na aba Atualizações do app (via Supabase Edge Function).
on:
  workflow_dispatch: {}

concurrency:
  group: scraper-fontes
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Instalar dependências
        run: pip install -r scraper/requirements.txt

      - name: Descobrir novas fontes
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python discover_fontes.py
