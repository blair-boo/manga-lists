name: Scraper tests

on:
  push:
    paths:
      - 'scraper/**'
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r scraper/requirements-dev.txt

      - run: python -m pytest scraper/tests -v
